  <path stroke-width="4" stroke-opacity="0.4" d="M426 228 L427 165 L482 166 L483 248" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

