  <path stroke-width="10" stroke-opacity="0.85" d="M410 370 L410 460 L488 462 L490 373 Z" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

