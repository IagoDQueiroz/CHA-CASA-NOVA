  <path stroke-width="7" stroke-opacity="0.55" d="M410 416 L488 415 M449 370 L449 462" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:7px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

