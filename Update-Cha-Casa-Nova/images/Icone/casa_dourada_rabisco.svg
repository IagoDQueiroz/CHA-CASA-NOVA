  <path stroke-width="14" stroke-opacity="0.9" d="M152 316 L152 560 L532 560 L532 316" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Segundo traço das paredes (efeito rabisco) -->
  <path stroke-width="5" stroke-opacity="0.4" d="M157 318 L156 556 L527 558 L528 320" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

