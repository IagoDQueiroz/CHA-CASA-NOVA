  <!-- Maçaneta porta -->
  <circle cx="394" cy="500" r="8" fill="none" stroke="#C8960C" stroke-width="8" stroke-opacity="0.8" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Textura solo / grama (tracinhos irregulares) -->
  <path stroke-width="6" stroke-opacity="0.35" d="M90 566 Q130 552 180 564 Q240 555 310 568 Q390 554 450 566 Q510 554 580 564 Q610 558 620 566" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path stroke-width="3.5" stroke-opacity="0.2" d="M92 574 Q160 564 230 572 Q320 562 400 574 Q480 562 560 572 Q600 566 622 574" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
