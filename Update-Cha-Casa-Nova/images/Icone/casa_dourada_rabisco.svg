  <path stroke-width="11" stroke-opacity="0.85" d="M282 560 L280 438 Q340 418 402 438 L402 560" style="fill:none;stroke:rgb(200, 150, 12);color:rgb(255, 255, 255);stroke-width:11px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

